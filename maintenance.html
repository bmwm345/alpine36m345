  <style>
    body {
      background-color: #121212;
      color: #ffffff;
      margin: 0;
      padding: 0;
      overflow-x: hidden; 
    }

    /* Fixed Tight-Spacing Badge */
    .badge-container {
      position: relative !important;
      display: flex !important;
      flex-direction: row !important;
      align-items: center !important;
      justify-content: center !important;

    .stripes {
      display: flex !important;
      margin-right: -15px !important; /* Pulls M closer to stripes */

    }

      position: relative;
      z-index: 2;
    }

    .badge-label {
      display: none !important; /* Removes E36 label */
    }

    nav {
      text-align: center;
      margin-bottom: 60px;
    }

    main {
      font-family: 'Libre Baskerville', serif;
      max-width: 800px;
      width: 90%;
      margin: 0 auto 100px auto;
      text-align: center;
    }

    h2 {
      font-family: 'Orbitron', sans-serif;
      text-transform: uppercase;
      font-size: 1.5rem;
      margin-bottom: 20px;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      margin-bottom: 15px;
      font-size: 1.1rem;
    }

    li a {
      color: #3498db; /* BMW Blue color for links */
      text-decoration: none;
      transition: 0.3s;
    }

    li a:hover {
      color: #e74c3c; /* BMW Red on hover */
    }
  </style>
</head>
